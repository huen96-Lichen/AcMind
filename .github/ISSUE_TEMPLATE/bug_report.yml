name: 缺陷反馈
description: 反馈 AcMind 中可复现的问题或回归。
title: "[缺陷]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间反馈问题。请尽量提供已经核实过的上下文信息。
  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 用一句话描述问题。
      placeholder: AcMind 在……时崩溃
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按步骤列出如何复现问题。
      placeholder: |
        1. 打开……
        2. 点击……
        3. 观察……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你预期应该发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true
  - type: input
    id: feature
    attributes:
      label: 受影响功能
      description: 应用中哪个区域受影响？
      placeholder: 剪贴板、系统状态、语音输入、设置、构建等
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS 版本
      placeholder: 26.5.1 (25F80)
    validations:
      required: true
  - type: input
    id: architecture
    attributes:
      label: Mac 架构
      placeholder: arm64
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 提交或发布版本
      description: 请提供你测试时对应的提交 SHA 或发布标签。
      placeholder: 1109c5e...
    validations:
      required: true
  - type: input
    id: xcode-swift
    attributes:
      label: Xcode 与 Swift 版本
      placeholder: Xcode 26.5, Swift 6.3.2
    validations:
      required: true
  - type: dropdown
    id: regression
    attributes:
      label: 回归状态
      description: 这是新出现的回归吗？
      options:
        - 新回归
        - 已存在问题
        - 不确定
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志、截图或备注
      description: 补充相关日志或截图，但请避免包含密钥或隐私数据。
      placeholder: 在这里粘贴日志，或附上截图。
