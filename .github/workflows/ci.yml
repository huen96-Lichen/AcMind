name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 并发控制：同一 PR 只保留最新运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Swift 原生构建 & 测试
  # ===========================================================================
  swift-build:
    name: Swift Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build (Debug)
        run: swift build

      - name: Build (Release)
        run: swift build -c Release

  swift-test:
    name: Swift Test
    runs-on: macos-14
    needs: [swift-build]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Run Tests
        run: swift test --parallel

  # ===========================================================================
  # Xcode 构建验证（模拟生产构建）
  # ===========================================================================
  xcode-build:
    name: Xcode Build
    runs-on: macos-14
    needs: [swift-build]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Native Build Script
        run: bash scripts/build.sh --release

  # ===========================================================================
  # 安全审计
  # ===========================================================================
  audit:
    name: Security Audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Check Swift Dependencies
        run: |
          swift package resolve
          echo "✅ Swift 依赖解析完成"
          echo "📦 外部依赖：GRDB.swift (唯一)"
