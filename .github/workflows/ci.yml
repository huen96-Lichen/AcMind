name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftpm:
    name: SwiftPM baseline
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select installed Xcode
        shell: bash
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1)"
          if [[ -z "${XCODE_APP:-}" ]]; then
            echo "No Xcode installation was found."
            exit 1
          fi
          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build Swift package
        run: swift build

      - name: Run Swift package tests
        run: swift test

  xcode-build:
    name: Xcode app build
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select installed Xcode
        shell: bash
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1)"
          if [[ -z "${XCODE_APP:-}" ]]; then
            echo "No Xcode installation was found."
            exit 1
          fi
          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build the app with signing disabled
        run: >
          xcodebuild
          -project AcMind.xcodeproj
          -scheme AcMind
          -configuration Debug
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          build
