<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>对照组 UI 组件目录 v0.4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&family=SF+Pro+Display:wght@300;400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg-0:#0a0a0c;--bg-1:#111116;--bg-2:#1a1a22;--bg-3:#24242e;
  --bg-card:rgba(255,255,255,0.03);--bg-card-hover:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);
  --text-0:#f0f0f4;--text-1:#a0a0b0;--text-2:#606070;
  --accent-1:#6c8cff;--accent-2:#ff6c8c;--accent-3:#6cffa0;--accent-4:#ffc06c;--accent-5:#c06cff;--accent-6:#6cd8ff;--accent-7:#ff9f43;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
  --sidebar-w:260px;--topbar-h:56px;
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:var(--bg-0);color:var(--text-0);overflow:hidden;height:100vh}

.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--topbar-h) 1fr;height:100vh}

/* topbar */
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:16px;padding:0 24px;background:var(--bg-1);border-bottom:1px solid var(--border);position:relative;z-index:10}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent-1),transparent);opacity:0.3}
.logo{font-weight:700;font-size:1.05rem;letter-spacing:-0.02em;display:flex;align-items:center;gap:10px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent-1);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.7)}}
.search-box{flex:1;max-width:420px;position:relative;margin:0 auto}
.search-box input{width:100%;padding:7px 14px 7px 34px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-0);font-family:var(--sans);font-size:0.85rem;outline:none;transition:border 0.2s}
.search-box input:focus{border-color:var(--accent-1)}
.search-box input::placeholder{color:var(--text-2)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-2)}
.stats{font-size:0.75rem;color:var(--text-2);font-family:var(--mono);white-space:nowrap}

/* sidebar */
.sidebar{background:var(--bg-1);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;scrollbar-width:thin;scrollbar-color:var(--bg-3) transparent}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:2px}
.nav-group{margin-bottom:2px}
.nav-label{padding:8px 20px 4px;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-2);font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:6px 20px;cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;font-size:0.82rem;color:var(--text-1)}
.nav-item:hover{background:rgba(255,255,255,0.03);color:var(--text-0)}
.nav-item.active{background:rgba(108,140,255,0.08);color:var(--accent-1);border-left-color:var(--accent-1)}
.nav-item .badge{margin-left:auto;font-size:0.6rem;font-family:var(--mono);background:var(--bg-3);color:var(--text-2);padding:1px 6px;border-radius:10px}
.nav-item.active .badge{background:rgba(108,140,255,0.15);color:var(--accent-1)}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* main */
.main{overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--bg-3) transparent}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:3px}

/* filter */
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.filter-chip{padding:4px 12px;border-radius:16px;font-size:0.72rem;cursor:pointer;background:var(--bg-2);border:1px solid var(--border);color:var(--text-1);transition:all 0.15s;font-family:var(--sans)}
.filter-chip:hover{border-color:var(--border-hover);color:var(--text-0)}
.filter-chip.active{background:rgba(108,140,255,0.12);border-color:var(--accent-1);color:var(--accent-1)}

/* project header */
.project-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.project-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff}
.project-title{font-size:1.2rem;font-weight:600;letter-spacing:-0.02em}
.project-subtitle{font-size:0.75rem;color:var(--text-2);margin-top:1px}

/* component grid */
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.comp-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.comp-card:hover{background:var(--bg-card-hover);border-color:var(--border-hover);transform:translateY(-1px);box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.comp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity 0.2s}
.comp-card:hover::before{opacity:1}

/* preview area */
.comp-preview{padding:16px;min-height:80px;display:flex;align-items:center;justify-content:center;background:var(--bg-2);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.comp-info{padding:12px 14px}
.comp-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.comp-name{font-family:var(--mono);font-size:0.82rem;font-weight:600;color:var(--text-0)}
.comp-type{font-size:0.6rem;padding:2px 7px;border-radius:10px;font-family:var(--mono);white-space:nowrap;flex-shrink:0}
.comp-desc{font-size:0.78rem;color:var(--text-1);line-height:1.45;margin-bottom:6px}
.comp-path{font-size:0.65rem;color:var(--text-2);font-family:var(--mono);padding:4px 8px;background:var(--bg-2);border-radius:var(--radius-xs);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:6px}
.comp-tags{display:flex;flex-wrap:wrap;gap:3px}
.comp-tag{font-size:0.6rem;padding:1px 7px;border-radius:4px;background:var(--bg-2);color:var(--text-2)}

/* color accents per project */
[data-project="hermespet"] .nav-dot,[data-project="hermespet"] .project-icon{background:#6c8cff}
[data-project="hermespet"] .comp-card::before{background:linear-gradient(90deg,#6c8cff,#8ca8ff)}
[data-project="hermespet"] .comp-type{background:rgba(108,140,255,0.12);color:#6c8cff}
[data-project="boringnotch"] .nav-dot,[data-project="boringnotch"] .project-icon{background:#ff6c8c}
[data-project="boringnotch"] .comp-card::before{background:linear-gradient(90deg,#ff6c8c,#ff8ca8)}
[data-project="boringnotch"] .comp-type{background:rgba(255,108,140,0.12);color:#ff6c8c}
[data-project="ccstatistics"] .nav-dot,[data-project="ccstatistics"] .project-icon{background:#6cffa0}
[data-project="ccstatistics"] .comp-card::before{background:linear-gradient(90deg,#6cffa0,#8cffb8)}
[data-project="ccstatistics"] .comp-type{background:rgba(108,255,160,0.12);color:#6cffa0}
[data-project="hot"] .nav-dot,[data-project="hot"] .project-icon{background:#ffc06c}
[data-project="hot"] .comp-card::before{background:linear-gradient(90deg,#ffc06c,#ffd08c)}
[data-project="hot"] .comp-type{background:rgba(255,192,108,0.12);color:#ffc06c}
[data-project="iglance"] .nav-dot,[data-project="iglance"] .project-icon{background:#c06cff}
[data-project="iglance"] .comp-card::before{background:linear-gradient(90deg,#c06cff,#d08cff)}
[data-project="iglance"] .comp-type{background:rgba(192,108,255,0.12);color:#c06cff}
[data-project="typeno"] .nav-dot,[data-project="typeno"] .project-icon{background:#6cd8ff}
[data-project="typeno"] .comp-card::before{background:linear-gradient(90deg,#6cd8ff,#8ce0ff)}
[data-project="typeno"] .comp-type{background:rgba(108,216,255,0.12);color:#6cd8ff}
[data-project="istat"] .nav-dot,[data-project="istat"] .project-icon{background:#ff9f43}
[data-project="istat"] .comp-card::before{background:linear-gradient(90deg,#ff9f43,#ffb86c)}
[data-project="istat"] .comp-type{background:rgba(255,159,67,0.12);color:#ff9f43}

/* modal */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:40px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-1);border:1px solid var(--border);border-radius:16px;width:100%;max-width:960px;max-height:85vh;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.6);display:flex;flex-direction:column}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:var(--mono);font-size:1.05rem;font-weight:600}
.modal-close{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg-3);color:var(--text-1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all 0.15s}
.modal-close:hover{background:var(--accent-2);color:#fff}
.modal-body{overflow-y:auto;padding:20px;flex:1;scrollbar-width:thin;scrollbar-color:var(--bg-3) transparent}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:2px}
.modal-preview-area{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:24px;margin-bottom:16px;display:flex;align-items:center;justify-content:center;min-height:120px}
.modal-section{margin-bottom:16px}
.modal-section-title{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-2);margin-bottom:6px;font-weight:600}
.modal-kv{display:grid;grid-template-columns:100px 1fr;gap:4px 10px;font-size:0.78rem}
.modal-kv dt{color:var(--text-2)}
.modal-kv dd{color:var(--text-1)}
.code-block{background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-family:var(--mono);font-size:0.74rem;line-height:1.55;color:var(--text-1);overflow-x:auto;white-space:pre;tab-size:2;max-height:300px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg-3) transparent}
.code-block::-webkit-scrollbar{width:4px;height:4px}
.code-block::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:2px}
.tag-list{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:2px 9px;border-radius:5px;font-size:0.7rem;background:var(--bg-3);color:var(--text-1)}
.empty{text-align:center;padding:60px 20px;color:var(--text-2)}
.empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:0.3}
.empty-text{font-size:0.85rem}

/* ── macOS-style preview components ── */
.pr-macmenu{display:flex;gap:12px;align-items:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:11px;color:rgba(255,255,255,0.85)}
.pr-menuitem{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.06);padding:3px 8px;border-radius:4px}
.pr-menuitem svg{opacity:0.7}

.pr-dropdown{background:rgba(30,30,40,0.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px;min-width:200px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:12px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.pr-dd-section{padding:4px 8px;font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.pr-dd-item{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:4px;color:rgba(255,255,255,0.8);cursor:default}
.pr-dd-item:hover{background:rgba(108,140,255,0.2)}
.pr-dd-value{color:rgba(255,255,255,0.5);font-family:var(--mono);font-size:11px}
.pr-dd-bar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin:4px 8px;overflow:hidden}
.pr-dd-bar-fill{height:100%;border-radius:2px}
.pr-dd-sep{height:1px;background:rgba(255,255,255,0.06);margin:4px 0}

.pr-settings{background:rgba(30,30,40,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px;min-width:260px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:12px}
.pr-settings-title{font-size:14px;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:12px}
.pr-setting-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.pr-setting-label{color:rgba(255,255,255,0.7)}
.pr-toggle{width:36px;height:20px;background:rgba(108,140,255,0.6);border-radius:10px;position:relative;cursor:pointer}
.pr-toggle::after{content:'';position:absolute;top:2px;right:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:all 0.2s}
.pr-toggle.on{background:rgba(108,140,255,0.8)}
.pr-toggle.off{background:rgba(255,255,255,0.15)}
.pr-toggle.off::after{right:auto;left:2px}

.pr-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px;min-width:200px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.pr-card-title{font-size:12px;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:4px}
.pr-card-desc{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.4}
.pr-card-value{font-size:22px;font-weight:700;color:rgba(255,255,255,0.9);font-family:var(--mono)}
.pr-card-label{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase}

.pr-graph{position:relative;width:100%;height:48px}
.pr-graph svg{width:100%;height:100%}

.pr-ring{width:48px;height:48px;position:relative}
.pr-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.pr-ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:rgba(255,255,255,0.9);font-family:var(--mono)}

.pr-island{background:rgba(20,20,28,0.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:8px 16px;display:flex;align-items:center;gap:10px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:12px;color:rgba(255,255,255,0.85);box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.pr-island-dot{width:6px;height:6px;border-radius:50%;background:#6cffa0;animation:pulse 1.5s ease-in-out infinite}

.pr-hud{background:rgba(20,20,28,0.9);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:10px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;color:rgba(255,255,255,0.9);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.pr-hud-icon{font-size:18px}
.pr-hud-value{font-size:20px;font-weight:700;font-family:var(--mono)}

.pr-notch{background:#1a1a22;border-radius:0 0 16px 16px;padding:6px 20px;display:flex;align-items:center;gap:8px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:11px;color:rgba(255,255,255,0.7);position:relative}
.pr-notch::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,0.05)}

.pr-bubble{background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:11px;color:rgba(255,255,255,0.8);position:relative;max-width:180px}
.pr-bubble::after{content:'';position:absolute;bottom:-6px;left:20px;width:12px;height:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-top:none;border-left:none;transform:rotate(45deg)}

.pr-progress{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;width:100%}
.pr-progress-fill{height:100%;border-radius:2px;transition:width 0.3s}

.pr-tab{display:flex;gap:2px;background:rgba(255,255,255,0.04);border-radius:8px;padding:2px}
.pr-tab-item{padding:5px 12px;border-radius:6px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:11px;color:rgba(255,255,255,0.5);cursor:default}
.pr-tab-item.active{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.9)}

.pr-stat-row{display:flex;gap:8px}
.pr-stat{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px 14px;min-width:90px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.pr-stat-label{font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:4px}
.pr-stat-value{font-size:16px;font-weight:700;color:rgba(255,255,255,0.9);font-family:var(--mono)}

.pr-overlay{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-width:220px}
.pr-overlay-title{font-size:12px;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:8px}
.pr-overlay-text{font-size:11px;color:rgba(255,255,255,0.6);line-height:1.4}
.pr-overlay-btns{display:flex;gap:6px;margin-top:10px}
.pr-btn{padding:5px 14px;border-radius:6px;font-size:11px;font-weight:500;border:none;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.pr-btn-primary{background:rgba(108,140,255,0.8);color:#fff}
.pr-btn-secondary{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7)}

.pr-wave{display:flex;align-items:end;gap:2px;height:20px}
.pr-wave-bar{width:3px;border-radius:2px;animation:wave 1s ease-in-out infinite}
@keyframes wave{0%,100%{height:4px}50%{height:18px}}

.pr-sparkline{display:flex;align-items:end;gap:1px;height:20px}
.pr-spark-bar{width:3px;border-radius:1px}

@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .comp-grid{grid-template-columns:1fr}
}
.view-switch{display:flex;align-items:center;gap:2px;background:var(--bg-2);padding:4px;border-radius:10px;border:1px solid var(--border)}
.view-switch-item{padding:6px 14px;font-size:0.78rem;color:rgba(255,255,255,0.5);border-radius:7px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.view-switch-item:hover{color:rgba(255,255,255,0.8)}
.view-switch-item.active{background:var(--accent-1);color:#0a0a10;font-weight:600}
.tech-section{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:14px}
.tech-subtitle{font-size:0.72rem;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;font-weight:600}
.tech-api-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.tech-api{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);padding:10px 12px;border-radius:8px}
.tech-api-name{font-family:var(--mono);font-size:0.72rem;color:rgba(255,159,67,0.9);margin-bottom:4px;font-weight:600}
.tech-api-desc{font-size:0.72rem;color:rgba(255,255,255,0.6);line-height:1.5}
.tech-tips{font-size:0.82rem;color:rgba(255,255,255,0.72);line-height:1.65}
</style>
</head>
<body>
<div class="app" id="app" data-project="hermespet">
  <header class="topbar">
    <div class="logo"><div class="logo-dot"></div>UI 组件目录</div>
    <div class="view-switch">
      <div class="view-switch-item ${at=='catalog'?'active':''}" onclick="sw('catalog')">组件目录</div>
      <div class="view-switch-item ${at=='tech'?'active':''}" onclick="sw('tech')">技术实现 · iStat 数据采集</div>

let ap='hermespet',af='all',sq='',at='catalog';

function render(){
  if(at==='tech'){rsTech();rmTech();usTech();}
  else{rs();rm();us();}
}

function sw(v){at=v;render();}

function rsTech(){
  document.getElementById('sidebar').innerHTML=`
    <div class="nav-group" data-project="tech">
      <div class="nav-label">数据采集 · API</div>
      ${techNotes.map((n,i)=>`
      <div class="nav-item ${i===0?'active':''}" onclick="sm(${i})">

        <span style="font-size:0.75rem;line-height:1.4;color:rgba(255,255,255,0.7)">${n.title.split(' · ')[0]}</span>
      </div>`).join('')}

}

let activeTechIdx=0;
function sm(i){activeTechIdx=i;rmTech();}

function rmTech(){
  const m=document.getElementById('main');
  const n=techNotes[activeTechIdx];
  m.innerHTML=`
    <div class="project-header" data-project="tech">
      <div class="project-icon" style="background:linear-gradient(135deg,#ff9f43,#ff6c8c)">◆</div>
      <div><div class="project-title">${n.title}</div><div class="project-subtitle">iStat Menus 系统采集实现 · 可直接用于 AcMind</div></div>
    </div>

      <div class="tech-subtitle">相关 API</div>
      <div class="tech-api-list">

      <div class="tech-subtitle">Swift 代码示例</div>

function usTech(){
  document.getElementById('stats').textContent=`${techNotes.length} 个数据域 · ${techNotes.reduce((s,n)=>s+n.apis.length,0)} 个 API`;
}

function rs(){
  document.getElementById('sidebar').innerHTML=P.map(p=>`
    <div class="nav-group" data-project="${p.id}">
      <div class="nav-label">${p.name}</div>
      <div class="nav-item ${p.id===ap?'active':''}" onclick="sp('${p.id}')">
        <div class="nav-dot"></div><span>${p.sub}</span>
        <span class="badge">${p.comps.length}</span>
      </div>
    </div>`).join('');
}

function sp(id){ap=id;af='all';document.getElementById('app').dataset.project=id;render();}

function fc(){
  const p=P.find(x=>x.id===ap);if(!p)return[];
  let c=p.comps;
  if(af!=='all')c=c.filter(x=>x.tags.some(t=>t.includes(af))||x.t.includes(af));
  if(sq){const q=sq.toLowerCase();c=c.filter(x=>x.n.toLowerCase().includes(q)||x.t.toLowerCase().includes(q)||x.d.toLowerCase().includes(q)||x.tags.some(t=>t.includes(q)));}
  return c;
}

function gt(){
  const p=P.find(x=>x.id===ap);if(!p)return[];
  const s=new Set();p.comps.forEach(c=>c.tags.forEach(t=>s.add(t)));return[...s].sort();
}

function rm(){
  const m=document.getElementById('main'),p=P.find(x=>x.id===ap);if(!p)return;
  const ts=gt(),cs=fc();
  m.innerHTML=`
    <div class="project-header" data-project="${p.id}">
      <div class="project-icon">${p.icon}</div>
      <div><div class="project-title">${p.name}</div><div class="project-subtitle">${p.sub}</div></div>
    </div>
    <div class="filter-bar">
      <div class="filter-chip ${af==='all'?'active':''}" onclick="sf('all')">全部</div>
      ${ts.map(t=>`<div class="filter-chip ${af===t?'active':''}" onclick="sf('${t}')">${t}</div>`).join('')}
    </div>
    ${cs.length===0?'<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">没有匹配的组件</div></div>':`
    <div class="comp-grid" data-project="${p.id}">
      ${cs.map(c=>`
      <div class="comp-card" onclick="om(${P.indexOf(p)},${p.comps.indexOf(c)})">
        <div class="comp-preview" data-preview="${c.preview}"></div>
        <div class="comp-info">
          <div class="comp-top">
            <div class="comp-name">${c.n}</div>
            <div class="comp-type">${c.t}</div>
          </div>
          <div class="comp-desc">${c.d}</div>
          <div class="comp-path">${c.p}</div>
          <div class="comp-tags">${c.tags.map(t=>`<span class="comp-tag">${t}</span>`).join('')}</div>
        </div>
      </div>`).join('')}
    </div>`}`;
  document.querySelectorAll('.comp-preview[data-preview]').forEach(el=>{el.innerHTML=renderPreview(el.dataset.preview);});
}

function sf(t){af=t;rm();}

function us(){
  const total=P.reduce((s,p)=>s+p.comps.length,0);
  const filtered=fc().length;
  document.getElementById('stats').textContent=af==='all'&&!sq?`${total} 组件 · ${P.length} 项目`:`${filtered} / ${P.find(x=>x.id===ap)?.comps.length||0} 组件`;
}

function om(pi,ci){
  const c=P[pi].comps[ci],p=P[pi];
  document.getElementById('modalTitle').textContent=c.n;
  document.getElementById('modalBody').innerHTML=`
    <div class="modal-preview-area" data-preview="${c.preview}"></div>
    <div class="modal-section">
      <div class="modal-section-title">基本信息</div>
      <dl class="modal-kv"><dt>类型</dt><dd>${c.t}</dd><dt>项目</dt><dd style="color:${p.c}">${p.name}</dd><dt>路径</dt><dd style="font-family:var(--mono);font-size:0.72rem">${c.p}</dd></dl>
    </div>

    <div class="modal-section"><div class="modal-section-title">标签</div><div class="tag-list">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>

function cl(){document.getElementById('modalOverlay').classList.remove('open');}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('searchInput').addEventListener('input',e=>{sq=e.target.value.trim();rm();us();});

function sparkSVG(data,color,w,h){
  const max=Math.max(...data),step=w/(data.length-1);
  let d=`M0 ${h}`;
  data.forEach((v,i)=>{d+=` L${i*step} ${h-(v/max*h*0.85)}`;});
  d+=` L${w} ${h} Z`;
  return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><defs><linearGradient id="g_${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.4"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${d}" fill="url(#g_${color.replace('#','')})" stroke="${color}" stroke-width="1.5"/></svg>`;
}

function ringSVG(pct,color,size){
  const r=(size-6)/2,c=Math.PI*2*r,off=c-(pct/100)*c;
  return`<div class="pr-ring" style="width:${size}px;height:${size}px"><svg viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg><div class="pr-ring-label">${pct}%</div></div>`;
}

function barSVG(data,color,w,h){
  const max=Math.max(...data),bw=w/data.length-2;
  return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${data.map((v,i)=>`<rect x="${i*(bw+2)}" y="${h-(v/max*h*0.9)}" width="${bw}" height="${v/max*h*0.9}" rx="1.5" fill="${color}" opacity="0.7"/>`).join('')}</svg>`;
}

  ism_keyboard:()=>`<div style="display:flex;align-items:center;gap:8px;min-width:220px;font-family:-apple-system,sans-serif;padding:6px"><span style="font-size:11px;color:rgba(255,255,255,0.6);min-width:30px">键盘</span><div style="flex:1;height:10px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden"><div style="width:44%;height:100%;background:#3a9cff;border-radius:5px"></div></div><span style="font-size:10px;color:rgba(255,255,255,0.7);font-family:var(--mono)">44%</span></div>`,
  ism_powerchart:()=>{const d=[];for(let i=0;i<30;i++)d.push(15+Math.random()*45);const mx=Math.max(...d);return `<div style="min-width:240px;font-family:-apple-system,sans-serif;padding:4px"><div style="display:flex;justify-content:space-between;padding:4px 2px;align-items:center"><span style="font-size:11px;color:rgba(255,255,255,0.9);font-weight:700;font-family:var(--mono)">6.7 W</span><span style="font-size:10px;color:rgba(58,156,255,0.7);background:rgba(58,156,255,0.08);padding:2px 8px;border-radius:10px">1小时 ⌄</span></div><div style="position:relative;height:54px;display:flex;align-items:flex-end;gap:2px;margin-top:4px">${d.map((v,i)=>`<div style="flex:1;height:${v/mx*100}%;background:linear-gradient(180deg,#3a9cff 0%,rgba(58,156,255,0.5) 100%);border-radius:1px 1px 0 0"></div>`).join('')}</div></div>`},
  ism_weathermulti:()=>`<div style="min-width:260px;font-family:-apple-system,sans-serif;padding:4px"><div style="font-size:14px;font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:4px;letter-spacing:-0.02em">22.2°</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:6px 0">${[['5:00','☀','22'],['6:00','☀','22'],['7:00','☀','23'],['8:00','⛅','23'],['9:00','⛅','23'],['10:00','⛅','23'],['11:00','🌤','23']].map(([t,i,tt])=>`<div style="text-align:center"><div style="font-size:9px;color:rgba(255,255,255,0.4);margin-bottom:3px">${t}</div><div style="font-size:14px">${i}</div><div style="font-size:11px;color:rgba(255,255,255,0.7);font-family:var(--mono);margin-top:2px">${tt}°</div><div style="width:20px;height:10px;border:2px solid rgba(255,255,255,0.1);border-bottom:none;border-radius:10px 10px 0 0;margin:4px auto 0"><div style="font-size:7px;text-align:center;color:rgba(255,255,255,0.4);padding-top:1px">88%</div></div></div>`).join('')}</div></div>`,
  ism_weathertoday:()=>`<div style="min-width:240px;font-family:-apple-system,sans-serif;padding:6px;text-align:center"><div style="font-size:22px;font-weight:700;color:rgba(255,255,255,0.9);letter-spacing:-0.03em">22°</div><div style="font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px">今天第 22 天</div><div style="font-size:14px;margin-top:6px">⛅</div><div style="font-size:10px;color:rgba(255,255,255,0.7);margin-top:4px;font-family:var(--mono)">12° ／ 24°</div></div>`
};

function renderPreview(id){return(previews[id]||(()=>'<div style="font-size:10px;color:rgba(255,255,255,0.2)">预览</div>'))();}

render();
</script>
</body>
</html>
