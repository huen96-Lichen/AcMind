<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcMind</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px;
            background: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { margin-top: 0; color: #007AFF; }
        .status { padding: 12px; background: #e8f5e9; border-radius: 6px; margin: 16px 0; }
        button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #0056b3; }
        pre { background: #f5f5f5; padding: 16px; border-radius: 6px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AcMind WebView</h1>
        <p>React 渲染器将加载于此</p>
        <div class="status" id="status">等待 Swift 服务...</div>
        <button onclick="testIPC()">测试 IPC 通信</button>
        <pre id="result"></pre>
    </div>
    <script>
        function testIPC() {
            if (window.acmind) {
                window.acmind.invoke('settings', 'get', {})
                    .then(result => {
                        document.getElementById('result').textContent = JSON.stringify(result, null, 2);
                        document.getElementById('status').textContent = 'IPC 通信成功';
                        document.getElementById('status').style.background = '#e8f5e9';
                    })
                    .catch(err => {
                        document.getElementById('result').textContent = 'Error: ' + err.message;
                        document.getElementById('status').textContent = 'IPC 通信失败';
                        document.getElementById('status').style.background = '#ffebee';
                    });
            } else {
                document.getElementById('result').textContent = 'window.acmind 未定义';
                document.getElementById('status').textContent = '桥接脚本未注入';
                document.getElementById('status').style.background = '#ffebee';
            }
        }

        // 监听 Swift 事件
        if (window.acmind) {
            window.acmind.on('status', (data) => {
                document.getElementById('status').textContent = '收到事件: ' + JSON.stringify(data);
            });
        }
    </script>
</body>
</html>
