<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0055D4"/>
    </linearGradient>
    <linearGradient id="capsuleA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e8f0fe" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DC8FF"/>
      <stop offset="100%" stop-color="#40A0FF"/>
    </linearGradient>
    <filter id="softShadowA" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowA">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgA)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="128" y1="16" x2="128" y2="496" stroke="white" stroke-width="1"/>
    <line x1="256" y1="16" x2="256" y2="496" stroke="white" stroke-width="1"/>
    <line x1="384" y1="16" x2="384" y2="496" stroke="white" stroke-width="1"/>
    <line x1="16" y1="128" x2="496" y2="128" stroke="white" stroke-width="1"/>
    <line x1="16" y1="256" x2="496" y2="256" stroke="white" stroke-width="1"/>
    <line x1="16" y1="384" x2="496" y2="384" stroke="white" stroke-width="1"/>
  </g>
  <!-- Capsule body -->
  <g filter="url(#softShadowA)">
    <rect x="156" y="136" width="200" height="240" rx="100" fill="url(#capsuleA)"/>
  </g>
  <!-- Neural network connections -->
  <g stroke="#0A84FF" stroke-width="1.5" opacity="0.3">
    <line x1="256" y1="180" x2="210" y2="230"/>
    <line x1="256" y1="180" x2="302" y2="230"/>
    <line x1="210" y1="230" x2="190" y2="280"/>
    <line x1="210" y1="230" x2="256" y2="280"/>
    <line x1="302" y1="230" x2="256" y2="280"/>
    <line x1="302" y1="230" x2="322" y2="280"/>
    <line x1="190" y1="280" x2="210" y2="330"/>
    <line x1="256" y1="280" x2="210" y2="330"/>
    <line x1="256" y1="280" x2="302" y2="330"/>
    <line x1="322" y1="280" x2="302" y2="330"/>
    <line x1="210" y1="330" x2="256" y2="360"/>
    <line x1="302" y1="330" x2="256" y2="360"/>
  </g>
  <!-- Neural nodes -->
  <g filter="url(#glowA)">
    <circle cx="256" cy="180" r="8" fill="url(#nodeGlow)"/>
    <circle cx="210" cy="230" r="6" fill="url(#nodeGlow)"/>
    <circle cx="302" cy="230" r="6" fill="url(#nodeGlow)"/>
    <circle cx="190" cy="280" r="5" fill="url(#nodeGlow)"/>
    <circle cx="256" cy="280" r="7" fill="url(#nodeGlow)"/>
    <circle cx="322" cy="280" r="5" fill="url(#nodeGlow)"/>
    <circle cx="210" cy="330" r="6" fill="url(#nodeGlow)"/>
    <circle cx="302" cy="330" r="6" fill="url(#nodeGlow)"/>
    <circle cx="256" cy="360" r="8" fill="url(#nodeGlow)"/>
  </g>
  <!-- Top brain detail -->
  <path d="M230 185 Q256 160 282 185" stroke="#0A84FF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M220 195 Q256 165 292 195" stroke="#0A84FF" stroke-width="1.5" fill="none" opacity="0.25"/>
</svg>