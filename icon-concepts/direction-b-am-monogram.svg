<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="50%" stop-color="#0070E0"/>
      <stop offset="100%" stop-color="#004EAA"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D6E8FF"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5AC8FA"/>
      <stop offset="100%" stop-color="#00C7FF"/>
    </linearGradient>
    <filter id="softShadowB" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerGlowB">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgB)"/>
  <!-- Subtle radial highlight -->
  <circle cx="256" cy="200" r="200" fill="white" opacity="0.05"/>
  <!-- Letter A -->
  <g filter="url(#softShadowB)">
    <path d="M140 360 L210 160 L230 160 L300 360 L270 360 L252 300 L188 300 L170 360 Z M196 270 L244 270 L220 190 Z" fill="url(#letterGrad)" opacity="0"/>
    <!-- A - modern geometric -->
    <polygon points="155,355 220,155 245,155 310,355" fill="none" stroke="url(#letterGrad)" stroke-width="18" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="178" y1="290" x2="287" y2="290" stroke="url(#letterGrad)" stroke-width="14" stroke-linecap="round"/>
  </g>
  <!-- Letter M -->
  <g filter="url(#softShadowB)">
    <!-- M - modern geometric -->
    <polyline points="225,355 225,155 282,265 340,155 340,355" fill="none" stroke="url(#letterGrad)" stroke-width="18" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <!-- Accent dot -->
  <circle cx="375" cy="175" r="12" fill="url(#accentGrad)"/>
  <!-- Accent line under -->
  <line x1="155" y1="385" x2="340" y2="385" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
</svg>