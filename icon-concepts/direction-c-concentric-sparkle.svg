<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgC" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
    <linearGradient id="ringGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#B8D4FF" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#A0C4FF" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sparkleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B8E0FF"/>
    </linearGradient>
    <filter id="softShadowC">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgC)"/>
  <!-- Concentric rings -->
  <g filter="url(#softShadowC)">
    <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ringGrad2)" stroke-width="3" opacity="0.4"/>
    <circle cx="256" cy="256" r="145" fill="none" stroke="url(#ringGrad2)" stroke-width="3" opacity="0.5"/>
    <circle cx="256" cy="256" r="110" fill="none" stroke="url(#ringGrad1)" stroke-width="3.5" opacity="0.6"/>
    <circle cx="256" cy="256" r="75" fill="none" stroke="url(#ringGrad1)" stroke-width="4" opacity="0.7"/>
    <circle cx="256" cy="256" r="40" fill="none" stroke="url(#ringGrad1)" stroke-width="4.5" opacity="0.8"/>
  </g>
  <!-- Ring segments for dynamic feel -->
  <g stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.25">
    <path d="M256 76 A180 180 0 0 1 436 256"/>
    <path d="M256 381 A110 110 0 0 1 146 256"/>
    <path d="M256 181 A75 75 0 0 1 331 256"/>
  </g>
  <!-- Four-pointed sparkle star at center -->
  <g filter="url(#sparkleGlow)" transform="translate(256,256)">
    <!-- Main sparkle -->
    <path d="M0,-32 L6,-6 L32,0 L6,6 L0,32 L-6,6 L-32,0 L-6,-6 Z" fill="url(#sparkleGrad)"/>
    <!-- Smaller rotated sparkle -->
    <path d="M0,-18 L4,-4 L18,0 L4,4 L0,18 L-4,4 L-18,0 L-4,-4 Z" fill="white" opacity="0.8" transform="rotate(45)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="white"/>
  </g>
  <!-- Floating particles -->
  <g fill="white" opacity="0.3">
    <circle cx="140" cy="140" r="2.5"/>
    <circle cx="380" cy="130" r="2"/>
    <circle cx="120" cy="350" r="2"/>
    <circle cx="390" cy="370" r="2.5"/>
    <circle cx="256" cy="80" r="1.5"/>
    <circle cx="100" cy="256" r="1.5"/>
  </g>
</svg>